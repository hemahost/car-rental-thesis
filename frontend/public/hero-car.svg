<svg width="960" height="560" viewBox="0 0 960 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="960" height="560" rx="32" fill="#EEF4FF"/>

  <!-- Background clouds / blobs -->
  <ellipse cx="160" cy="110" rx="150" ry="70" fill="#DDEEFF" opacity="0.7"/>
  <ellipse cx="820" cy="130" rx="130" ry="60" fill="#D6EEFF" opacity="0.6"/>
  <ellipse cx="500" cy="80" rx="200" ry="50" fill="#E8F2FF" opacity="0.5"/>

  <!-- Road / ground shadow -->
  <ellipse cx="480" cy="460" rx="340" ry="22" fill="#C5D5EE" opacity="0.6"/>

  <!-- === CAR BODY === -->
  <!-- Main lower body -->
  <path d="M160 370 Q165 310 210 300 L310 295 Q370 220 480 205 Q580 195 650 225 L750 290 L790 300 Q820 310 830 340 L835 370 Z" fill="#2563EB"/>

  <!-- Body highlight (top gleam) -->
  <path d="M310 295 Q370 222 480 207 Q570 198 645 226 L680 248 Q610 215 490 222 Q385 230 330 295 Z" fill="#3B82F6" opacity="0.5"/>

  <!-- Lower body / sill -->
  <rect x="158" y="368" width="678" height="38" rx="10" fill="#1D4ED8"/>

  <!-- Bumper front -->
  <path d="M810 355 Q845 358 855 375 Q860 395 850 410 L830 412 L820 380 Z" fill="#1E40AF"/>
  <!-- Bumper front grille -->
  <rect x="825" y="378" width="24" height="8" rx="4" fill="#93C5FD" opacity="0.7"/>
  <rect x="825" y="390" width="24" height="5" rx="2.5" fill="#93C5FD" opacity="0.5"/>

  <!-- Bumper rear -->
  <path d="M150 355 Q115 358 105 375 Q100 395 110 410 L130 412 L140 380 Z" fill="#1E40AF"/>

  <!-- === WINDOWS === -->
  <!-- Rear window -->
  <path d="M318 292 Q355 235 410 222 L415 275 Q380 278 340 292 Z" fill="#BFDBFE" opacity="0.85"/>
  <!-- Window frame -->
  <path d="M318 292 Q355 235 410 222 L415 275 Q380 278 340 292 Z" fill="none" stroke="#1D4ED8" stroke-width="3"/>

  <!-- Middle window -->
  <path d="M422 270 L420 215 Q460 207 500 205 L500 268 Z" fill="#BFDBFE" opacity="0.85"/>
  <path d="M422 270 L420 215 Q460 207 500 205 L500 268 Z" fill="none" stroke="#1D4ED8" stroke-width="3"/>

  <!-- Front window -->
  <path d="M508 267 L510 204 Q570 198 630 220 L645 224 L620 272 Z" fill="#BAE6FD" opacity="0.85"/>
  <path d="M508 267 L510 204 Q570 198 630 220 L645 224 L620 272 Z" fill="none" stroke="#1D4ED8" stroke-width="3"/>

  <!-- Window dividers (pillars) -->
  <line x1="418" y1="213" x2="422" y2="273" stroke="#1D4ED8" stroke-width="5" stroke-linecap="round"/>
  <line x1="506" y1="205" x2="508" y2="269" stroke="#1D4ED8" stroke-width="5" stroke-linecap="round"/>
  <line x1="638" y1="224" x2="648" y2="278" stroke="#1D4ED8" stroke-width="5" stroke-linecap="round"/>

  <!-- === DOOR LINES === -->
  <line x1="415" y1="275" x2="420" y2="400" stroke="#1A3FBF" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="625" y1="272" x2="635" y2="400" stroke="#1A3FBF" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Door handles -->
  <rect x="445" y="330" width="36" height="10" rx="5" fill="#93C5FD" opacity="0.9"/>
  <rect x="655" y="325" width="36" height="10" rx="5" fill="#93C5FD" opacity="0.9"/>

  <!-- === HEADLIGHT (front) === -->
  <path d="M790 305 Q820 308 838 325 L835 338 Q810 328 785 326 Z" fill="#FEF08A" opacity="0.95"/>
  <path d="M790 305 Q820 308 838 325 L835 338 Q810 328 785 326 Z" fill="none" stroke="#FBBF24" stroke-width="2"/>
  <!-- Headlight DRL strip -->
  <rect x="793" y="317" width="38" height="5" rx="2.5" fill="#FDE68A" opacity="0.8"/>

  <!-- === TAILLIGHT (rear) === -->
  <path d="M168 306 Q140 310 123 326 L125 340 Q148 330 172 328 Z" fill="#FCA5A5" opacity="0.95"/>
  <path d="M168 306 Q140 310 123 326 L125 340 Q148 330 172 328 Z" fill="none" stroke="#EF4444" stroke-width="2"/>
  <rect x="127" y="316" width="36" height="5" rx="2.5" fill="#FEE2E2" opacity="0.8"/>

  <!-- === ROOF RACK (subtle) === -->
  <rect x="340" y="200" width="300" height="7" rx="3.5" fill="#1E40AF" opacity="0.4"/>

  <!-- === WHEELS === -->
  <!-- Rear wheel -->
  <circle cx="300" cy="420" r="68" fill="#0F172A"/>
  <circle cx="300" cy="420" r="52" fill="#1E293B"/>
  <circle cx="300" cy="420" r="36" fill="#334155"/>
  <!-- Spokes rear -->
  <line x1="300" y1="384" x2="300" y2="456" stroke="#94A3B8" stroke-width="7" stroke-linecap="round"/>
  <line x1="264" y1="420" x2="336" y2="420" stroke="#94A3B8" stroke-width="7" stroke-linecap="round"/>
  <line x1="275" y1="395" x2="325" y2="445" stroke="#94A3B8" stroke-width="5" stroke-linecap="round"/>
  <line x1="325" y1="395" x2="275" y2="445" stroke="#94A3B8" stroke-width="5" stroke-linecap="round"/>
  <circle cx="300" cy="420" r="12" fill="#CBD5E1"/>

  <!-- Front wheel -->
  <circle cx="680" cy="420" r="68" fill="#0F172A"/>
  <circle cx="680" cy="420" r="52" fill="#1E293B"/>
  <circle cx="680" cy="420" r="36" fill="#334155"/>
  <!-- Spokes front -->
  <line x1="680" y1="384" x2="680" y2="456" stroke="#94A3B8" stroke-width="7" stroke-linecap="round"/>
  <line x1="644" y1="420" x2="716" y2="420" stroke="#94A3B8" stroke-width="7" stroke-linecap="round"/>
  <line x1="655" y1="395" x2="705" y2="445" stroke="#94A3B8" stroke-width="5" stroke-linecap="round"/>
  <line x1="705" y1="395" x2="655" y2="445" stroke="#94A3B8" stroke-width="5" stroke-linecap="round"/>
  <circle cx="680" cy="420" r="12" fill="#CBD5E1"/>

  <!-- Wheel arches -->
  <path d="M220 408 Q222 358 300 352 Q378 358 380 408" fill="#1D4ED8" stroke="#1A3FBF" stroke-width="2"/>
  <path d="M600 408 Q602 358 680 352 Q758 358 760 408" fill="#1D4ED8" stroke="#1A3FBF" stroke-width="2"/>

  <!-- === UNDER-BODY LINE === -->
  <rect x="158" y="404" width="678" height="12" rx="6" fill="#1E40AF" opacity="0.5"/>

  <!-- === REFLECTION ON GROUND === -->
  <ellipse cx="480" cy="492" rx="300" ry="12" fill="#2563EB" opacity="0.08"/>
</svg>
