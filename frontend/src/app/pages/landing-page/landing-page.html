<div class="landing">

  <header class="topbar">
    <a class="topbar__logo" routerLink="/home">CarRental</a>
    <div class="topbar__actions">
      <button class="theme-toggle" (click)="theme.toggleTheme()">{{ theme.isDarkMode ? '☀️' : '🌙' }}</button>
      <a routerLink="/login" class="topbar__login">Login</a>
    </div>
  </header>


  <main class="hero">
    <h1 class="hero__title">Welcome to Our Car Rental Service</h1>
    <p class="hero__subtitle">Book your perfect car in minutes.</p>

    <div class="hero__actions">
      <a routerLink="/login" class="btn btn--primary">Log In / Register</a>
      <a routerLink="/home" class="btn btn--outline">Continue as Guest</a>
    </div>
  </main>


  <footer class="footer">
    <p>&copy; 2026 Car Rental</p>
  </footer>
</div>
