<div class="login-page">
  <div class="login-container">
    <!-- Header -->
    <div class="login-header">
      <a routerLink="/" class="logo">🚗 CarRental</a>
      <p class="subtitle">Welcome back! Please sign in to your account.</p>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button
        class="tab-btn"
        [class.active]="activeTab === 'login'"
        (click)="switchTab('login')"
      >
        Login
      </button>
      <button
        class="tab-btn"
        [class.active]="activeTab === 'register'"
        (click)="switchTab('register')"
      >
        Register
      </button>
    </div>

    <!-- Messages -->
    <div class="message error" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>
    <div class="message success" *ngIf="successMessage">
      {{ successMessage }}
    </div>

    <!-- Login Form -->
    <form
      class="auth-form"
      *ngIf="activeTab === 'login'"
      (ngSubmit)="onLogin()"
    >
      <div class="form-group">
        <label for="loginEmail">Email</label>
        <input
          type="email"
          id="loginEmail"
          [(ngModel)]="loginEmail"
          name="loginEmail"
          placeholder="you@example.com"
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input
          type="password"
          id="loginPassword"
          [(ngModel)]="loginPassword"
          name="loginPassword"
          placeholder="Enter your password"
          autocomplete="current-password"
        />
      </div>

      <button type="submit" class="submit-btn" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <!-- Register Form -->
    <form
      class="auth-form"
      *ngIf="activeTab === 'register'"
      (ngSubmit)="onRegister()"
    >
      <div class="form-group">
        <label for="registerName">Full Name</label>
        <input
          type="text"
          id="registerName"
          [(ngModel)]="registerName"
          name="registerName"
          placeholder="John Doe"
          autocomplete="name"
        />
      </div>

      <div class="form-group">
        <label for="registerEmail">Email</label>
        <input
          type="email"
          id="registerEmail"
          [(ngModel)]="registerEmail"
          name="registerEmail"
          placeholder="you@example.com"
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="registerPassword">Password</label>
        <input
          type="password"
          id="registerPassword"
          [(ngModel)]="registerPassword"
          name="registerPassword"
          placeholder="Min. 6 characters"
          autocomplete="new-password"
        />
      </div>

      <div class="form-group">
        <label for="registerConfirmPassword">Confirm Password</label>
        <input
          type="password"
          id="registerConfirmPassword"
          [(ngModel)]="registerConfirmPassword"
          name="registerConfirmPassword"
          placeholder="Re-enter your password"
          autocomplete="new-password"
        />
      </div>

      <button type="submit" class="submit-btn" [disabled]="loading">
        {{ loading ? 'Creating account...' : 'Create Account' }}
      </button>
    </form>

    <!-- Footer link -->
    <div class="footer-link">
      <a routerLink="/home">← Continue as Guest</a>
    </div>
  </div>
</div>
